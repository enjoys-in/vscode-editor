<div class="messages" id="messages">
  <div class="welcome" id="welcome">
    <div class="loader" id="loader">
      <div class="spinner"></div>
      <span>Connecting to AI...</span>
    </div>
    <div class="welcome-content" id="welcome-content" style="display:none">
      <div class="welcome-icon">
        <svg viewBox="0 0 16 16"><path d="M8 1l1.8 3.6L14 5.4l-3 2.9.7 4.1L8 10.5 4.3 12.4l.7-4.1-3-2.9 4.2-.8z"/></svg>
      </div>
      <h3>AI Assistant</h3>
      <p>Ask me anything about your code. I can explain, refactor, debug, or write new code for you.</p>
      <div class="hints">
        <div class="hint" data-q="Explain the currently open file">Explain the current file</div>
        <div class="hint" data-q="Find potential bugs in this code">Find bugs in my code</div>
        <div class="hint" data-q="Suggest improvements and refactoring for this code">Suggest improvements</div>
      </div>
    </div>
  </div>
</div>

<div class="context-chips" id="context-chips"></div>

<div class="input-wrap">
  <div class="file-dropdown" id="file-dropdown"></div>
  <div class="input-box">
    <textarea id="input" rows="1" placeholder="Ask anything... (@ to attach file, Shift+Enter for newline)"></textarea>
    <div class="input-toolbar">
      <div class="left">
        <div class="model-chip" title="Select provider">
          <span class="chip-icon"><svg viewBox="0 0 16 16"><path d="M11.1 1.7l1.5 1.5L3.5 12.3l-1.5-1.5L11.1 1.7zm-8.6 9l1.5 1.5-.8 2.3-2.3.8.8-2.3.8-2.3z"/></svg></span>
          <select id="provider-select"><option>...</option></select>
        </div>
        <div class="model-chip" title="Select model">
          <span class="chip-icon"><svg viewBox="0 0 16 16"><path d="M5.4 4.8C5.4 3.3 6.6 2 8 2s2.6 1.3 2.6 2.8c0 1-.5 1.8-1.3 2.3v1.4c1.8.5 3.2 2 3.2 3.9V14H3.5v-1.6c0-1.9 1.4-3.4 3.2-3.9V7.1C5.9 6.6 5.4 5.8 5.4 4.8z"/></svg></span>
          <select id="model-select"><option>...</option></select>
        </div>
      </div>
      <div class="right">
        <button class="tool-btn" id="clear-btn" title="New chat">
          <svg viewBox="0 0 16 16"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zm3.5 9.5l-1 1L8 9l-2.5 2.5-1-1L7 8 4.5 5.5l1-1L8 7l2.5-2.5 1 1L9 8l2.5 2.5z"/></svg>
        </button>
        <button class="send-btn" id="send-btn">
          <svg id="send-icon" viewBox="0 0 16 16"><path d="M1 1.5l14 6.5-14 6.5V9l10-1-10-1V1.5z"/></svg>
          <span id="send-label">Send</span>
        </button>
      </div>
    </div>
  </div>
</div>
